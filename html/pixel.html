<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도트 & 아스키 아트 변환기 | Pocket Tools Lab</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="👾 도트 & 아스키 아트 변환기">
    <meta property="og:description" content="픽셀 정밀 조절부터 중복 없는 색상 추출까지!">
    <meta property="og:image" content="../img/og-pixel.png">
    <link rel="icon" href="../img/og-pixel.png" type="image/png">
    <link rel="stylesheet" href="../css/pixel_style.css">
</head>
<body>

    <div class="nav"><a href="../index.html">← 홈으로 돌아가기</a></div>

    <div class="container">
        <h2>👾 도트 & 아스키 아트 변환기</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'imageTab')">이미지 도트 (.PNG)</button>
            <button class="tab-btn" onclick="openTab(event, 'textTab')">카톡용 텍스트 아트</button>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; font-size: 14px;">📁 이미지 업로드: </label>
            <input type="file" id="upload" accept="image/*">
        </div>

        <div id="imageTab" class="tab-content active">
            <div class="viewer-section">
                <canvas id="canvas"></canvas>
                <div><span id="pixelRes" class="pixel-badge">이미지 대기 중</span></div>
                <button class="btn-main" onclick="downloadImg()">💾 고해상도 이미지 저장</button>
            </div>
            
            <div class="controls">
                <div class="label-group"><label>픽셀 크기 (가로)</label> <span id="rangeLabel" style="color:var(--main-pink)">32px</span></div>
                <input type="range" id="sizeRange" min="8" max="256" value="32">
                <input type="number" id="sizeInput" value="32">

                <div class="label-group"><label>색상 구성 (Palette)</label></div>
                <select id="colorSelect">
                    <option value="0">원본 색상</option>
                    <option value="8">8색 레트로</option>
                    <option value="16">16색 게임보이</option>
                    <option value="32">32색 표준</option>
                    <option value="256">256색 8비트</option>
                    <option value="gray">8단계 흑백</option>
                    <option value="bw">단순 2색</option>
                </select>

                <div class="label-group"><label>저장 배율</label></div>
                <select id="downloadScale">
                    <option value="1">1배</option>
                    <option value="10" selected>10배</option>
                    <option value="20">20배</option>
                </select>

                <div class="label-group"><label>🎨 사용된 색상 (중복 제거됨)</label></div>
                <div id="colorList" class="color-list"></div>
            </div>
        </div>

        <div id="textTab" class="tab-content">
            <div class="viewer-section">
                <div class="kakao-preview">
                    <div class="kakao-bubble">
                        <textarea id="asciiResult" readonly placeholder="이미지를 업로드하면 메세지가 생성됩니다."></textarea>
                    </div>
                </div>
                <button class="btn-main" onclick="copyAscii()">📋 카톡용 메세지 복사하기</button>
            </div>
            <div class="controls">
                <div class="label-group"><label>카톡 메세지 폭 (글자 수)</label><span id="asciiVal" style="color:var(--main-pink)">18자</span></div>
                <input type="range" id="asciiRange" min="10" max="35" value="18">
                <p class="info-txt">※ 모바일 카톡 전송 시 15~22자가 가장 깨지지 않고 예쁘게 나옵니다.</p>

                <div class="label-group"><label>도트 모양 선택</label></div>
                <select id="charMode" onchange="process()">
                    <option value="square">■□ (기본 사각형)</option>
                    <option value="circle">●○ (원형 도트)</option>
                    <option value="heart">♥♡ (하트)</option>
                    <option value="star">★☆ (별빛)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // 소스 보호 로직
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        let originalImg = null;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const sizeRange = document.getElementById('sizeRange');
        const sizeInput = document.getElementById('sizeInput');
        const colorSelect = document.getElementById('colorSelect');
        const asciiRange = document.getElementById('asciiRange');
        const asciiResult = document.getElementById('asciiResult');
        const charModeSelect = document.getElementById('charMode');

        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
            if(originalImg) process();
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { originalImg = img; process(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        sizeRange.oninput = () => { sizeInput.value = sizeRange.value; updateLabel(); process(); };
        sizeInput.oninput = () => { sizeRange.value = sizeInput.value; updateLabel(); process(); };
        colorSelect.onchange = process;
        
        asciiRange.oninput = () => { 
            document.getElementById('asciiVal').innerText = asciiRange.value + "자"; 
            process(); 
        };

        function updateLabel() {
            document.getElementById('rangeLabel').innerText = sizeRange.value + "px";
        }

        function process() {
            if(!originalImg) return;
            const ratio = originalImg.height / originalImg.width;
        
            // 1. 이미지 도트 처리 (기존 PNG 저장용 로직 - 그대로 유지)
            const s1 = parseInt(sizeInput.value) || 32;
            canvas.width = s1; canvas.height = Math.round(s1 * ratio);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            if(colorSelect.value !== "0") applyColorLimit(colorSelect.value);
            extractColors();
        
            // 2. [수정됨] 텍스트 도트 처리 - 무조건 18자 폭에 맞춰 압축
            const charSet = {
                square: ['■', '□'], circle: ['●', '○'],
                heart: ['♥', '♡'], star: ['★', '☆']
            };
            const [dark, light] = charSet[charModeSelect.value];
            
            const textWidth = 18; // 18자로 강제 고정
            const textHeight = Math.round(textWidth * ratio); 
            
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.width = textWidth;
            tCanvas.height = textHeight;
        
            // 핵심: 원본 이미지 전체를 (0,0,원본폭,원본높이) 가져와서 18자 크기로 꽉 채워 그립니다.
            tCtx.drawImage(originalImg, 0, 0, originalImg.width, originalImg.height, 0, 0, textWidth, textHeight);
        
            const pixData = tCtx.getImageData(0, 0, textWidth, textHeight).data;
            let asciiStr = "";
        
            for(let y=0; y<textHeight; y++){
                for(let x=0; x<textWidth; x++){
                    const i = (y * textWidth + x) * 4;
                    // 밝기 계산 (투명도 포함)
                    const r = pixData[i], g = pixData[i+1], b = pixData[i+2], a = pixData[i+3];
                    const bright = (r + g + b) / 3;
        
                    // 배경이 투명하거나(a < 128) 밝으면 빈칸, 어두우면 채운칸
                    if(a < 128 || bright > 180) {
                        asciiStr += light;
                    } else {
                        asciiStr += dark;
                    }
                }
                asciiStr += "\n";
            }
        
            const resultArea = document.getElementById('asciiResult');
            resultArea.value = asciiStr.trim();
            
            // 카톡 레이아웃 높이 자동 조절
            resultArea.style.height = 'auto';
            resultArea.style.height = (resultArea.scrollHeight) + 'px';
        }

        // 이미지 도트 관련 함수 (기존과 동일)
        function applyColorLimit(mode) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                if (mode === 'gray') {
                    const avg = (r + g + b) / 3;
                    data[i] = data[i+1] = data[i+2] = Math.round(avg / 32) * 32;
                } else if (mode === 'bw') {
                    const val = (r+g+b)/3 > 128 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = val;
                } else {
                    const count = parseInt(mode);
                    const step = Math.floor(256 / Math.pow(count, 1/3));
                    data[i] = Math.round(r/step)*step;
                    data[i+1] = Math.round(g/step)*step;
                    data[i+2] = Math.round(b/step)*step;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function extractColors() {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const colors = new Set();
            for (let i = 0; i < data.length; i += 4) {
                if (data[i+3] < 128) continue;
                const hex = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors.add(hex);
            }
            const list = document.getElementById('colorList');
            list.innerHTML = '';
            Array.from(colors).slice(0, 40).forEach(hex => {
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `<div class="color-box" style="background:${hex}"></div><div class="color-code">${hex}</div>`;
                list.appendChild(item);
            });
        }

        function downloadImg() {
            if(!originalImg) return;
            const scale = parseInt(document.getElementById('downloadScale').value);
            const temp = document.createElement('canvas');
            const tCtx = temp.getContext('2d');
            temp.width = canvas.width * scale; temp.height = canvas.height * scale;
            tCtx.imageSmoothingEnabled = false;
            tCtx.drawImage(canvas, 0, 0, temp.width, temp.height);
            const link = document.createElement('a');
            link.download = `pixel-art-${canvas.width}x${canvas.height}.png`;
            link.href = temp.toDataURL();
            link.click();
        }

        function copyAscii() {
            if(!asciiResult.value) {
                alert('먼저 이미지를 업로드해주세요!');
                return;
            }
            asciiResult.select();
            document.execCommand('copy');
            alert('카톡용 도트 아트가 복사되었습니다! 대화창에 붙여넣기 하세요.');
        }
    </script>
</body>
</html>
