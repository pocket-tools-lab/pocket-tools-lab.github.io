<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로 도트 변환기 | Pocket Tools Lab</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pocket-tools-lab.github.io/pixel.html">
    <meta property="og:title" content="👾 도트 그림 변환기">
    <meta property="og:description" content="픽셀 정밀 조절부터 색상 팔레트 추출, 고해상도 저장까지!">
    <meta property="og:image" content="https://pocket-tools-lab.github.io/og-pixel.png">
    
    <link rel="icon" href="https://pocket-tools-lab.github.io/og-pixel.png" type="image/png">

    <style>
        :root { 
            --main-pink: #ff69b4; 
            --light-pink: #fff5fa; 
            --border-pink: #ffceee; 
            --dark-gray: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #fafafa; 
            margin: 0; 
            padding: 20px; 
            color: var(--dark-gray); 
        }

        .nav { max-width: 900px; margin: 0 auto 15px; }
        .nav a { text-decoration: none; color: var(--main-pink); font-weight: bold; font-size: 14px; }
        
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #dbdbdb; 
            max-width: 900px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 1fr 320px; 
            gap: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        @media (max-width: 850px) { 
            .container { grid-template-columns: 1fr; } 
        }

        .viewer-section { text-align: center; }
        .control-section { 
            background: var(--light-pink); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--border-pink); 
            height: fit-content;
        }

        h2 { font-size: 22px; margin-top: 0; margin-bottom: 20px; color: var(--main-pink); text-align: center; }
        
        .label-group { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 8px; 
            font-weight: bold; 
            font-size: 13px; 
            margin-top: 15px; 
        }

        input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 12px; }
        
        input[type="number"], select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border-pink); 
            margin-bottom: 10px; 
            outline: none; 
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="range"] { 
            width: 100%; 
            accent-color: var(--main-pink); 
            margin-bottom: 10px; 
            cursor: pointer;
        }

        #canvas { 
            width: 100%; 
            max-width: 500px;
            border: 5px solid var(--border-pink); 
            background: #f0f0f0; 
            image-rendering: pixelated; 
            border-radius: 12px; 
            display: block;
            margin: 0 auto;
        }
        
        .color-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); 
            gap: 8px; 
            margin-top: 10px; 
            max-height: 180px; 
            overflow-y: auto; 
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border-pink);
        }

        .color-item { text-align: center; }
        .color-box { 
            width: 100%; 
            height: 25px; 
            border-radius: 4px; 
            border: 1px solid rgba(0,0,0,0.1); 
            margin-bottom: 4px; 
        }
        .color-code { font-size: 9px; color: #888; font-family: monospace; }

        .btn-save { 
            background: var(--main-pink); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px; 
            transition: 0.3s;
        }
        .btn-save:hover { background: #ff4da6; transform: translateY(-2px); }
        .btn-save:active { transform: translateY(0); }

        .pixel-info { 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--main-pink); 
            margin-top: 15px; 
            padding: 8px;
            background: var(--light-pink);
            display: inline-block;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="nav"><a href="index.html">← 홈으로 돌아가기</a></div>

    <div class="container">
        <div class="viewer-section">
            <h2>👾 프로 도트 변환기</h2>
            <canvas id="canvas"></canvas>
            <div id="pixelRes" class="pixel-info">이미지를 업로드 해주세요</div>
            <button class="btn-save" onclick="downloadImg()">✨ 고해상도 도트 저장하기</button>
        </div>

        <div class="control-section">
            <div class="label-group"><label>1. 이미지 불러오기</label></div>
            <input type="file" id="upload" accept="image/*">

            <div class="label-group">
                <label>2. 픽셀 해상도 (가로)</label> 
                <span id="rangeLabel" style="color: var(--main-pink)">32px</span>
            </div>
            <input type="range" id="sizeRange" min="8" max="256" value="32">
            <input type="number" id="sizeInput" value="32" min="8" max="1024">

            <div class="label-group"><label>3. 색상 모드 설정</label></div>
            <select id="colorSelect">
                <option value="0">원본 색상 유지</option>
                <option value="8">8색 (극강의 레트로)</option>
                <option value="16">16색 (게임보이 느낌)</option>
                <option value="256">256색 (고전 PC)</option>
                <option value="gray">흑백 명암 (8단계)</option>
                <option value="bw">단순 2색 (Black & White)</option>
            </select>

            <div class="label-group"><label>4. 저장 배율 선택</label></div>
            <select id="downloadScale">
                <option value="1">1배 (원본 픽셀 크기)</option>
                <option value="5">5배 크게 저장</option>
                <option value="10" selected>10배 크게 저장 (권장)</option>
                <option value="20">20배 크게 저장</option>
            </select>

            <div class="label-group"><label>🎨 사용된 색상 리스트</label></div>
            <div id="colorList" class="color-list"></div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const sizeRange = document.getElementById('sizeRange');
        const sizeInput = document.getElementById('sizeInput');
        const colorSelect = document.getElementById('colorSelect');
        const downloadScale = document.getElementById('downloadScale');
        const colorListDiv = document.getElementById('colorList');
        const pixelRes = document.getElementById('pixelRes');
        const rangeLabel = document.getElementById('rangeLabel');
        
        let originalImg = null;

        // 파일 업로드 이벤트
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { originalImg = img; process(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 슬라이더와 숫자 입력창 동기화
        sizeRange.addEventListener('input', () => {
            sizeInput.value = sizeRange.value;
            rangeLabel.innerText = sizeRange.value + "px";
            process();
        });

        sizeInput.addEventListener('input', () => {
            sizeRange.value = sizeInput.value;
            rangeLabel.innerText = sizeInput.value + "px";
            process();
        });

        colorSelect.addEventListener('change', process);

        function process() {
            if (!originalImg) return;
            const size = parseInt(sizeInput.value) || 32;
            const ratio = originalImg.height / originalImg.width;
            const h = Math.round(size * ratio);
            
            canvas.width = size;
            canvas.height = h;
            pixelRes.innerText = `현재 해상도: ${size} X ${h}`;

            // 이미지 렌더링 (안티앨리어싱 제거)
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(originalImg, 0, 0, size, h);

            const mode = colorSelect.value;
            if (mode !== "0") applyColorLimit(mode);
            extractColors();
        }

        function applyColorLimit(mode) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];

                if (mode === 'gray') {
                    const avg = (r + g + b) / 3;
                    data[i] = data[i+1] = data[i+2] = Math.round(avg / 32) * 32;
                } else if (mode === 'bw') {
                    const val = (r + g + b) / 3 > 128 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = val;
                } else {
                    const count = parseInt(mode);
                    const step = Math.floor(256 / Math.pow(count, 1/3));
                    data[i] = Math.round(r / step) * step;
                    data[i+1] = Math.round(g / step) * step;
                    data[i+2] = Math.round(b / step) * step;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function extractColors() {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const colors = new Set();

            for (let i = 0; i < data.length; i += 4) {
                if (data[i+3] < 128) continue; // 투명도 높은 픽셀 제외
                const hex = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors.add(hex);
            }

            colorListDiv.innerHTML = '';
            Array.from(colors).slice(0, 50).forEach(hex => {
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `<div class="color-box" style="background:${hex}"></div><div class="color-code">${hex}</div>`;
                colorListDiv.appendChild(item);
            });
        }

        function downloadImg() {
            if (!originalImg) { alert('이미지를 먼저 업로드하세요!'); return; }
            
            const scale = parseInt(downloadScale.value);
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = canvas.width * scale;
            tempCanvas.height = canvas.height * scale;
            
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            const link = document.createElement('a');
            link.download = `pixel-art-${canvas.width}x${canvas.height}.png`;
            link.href = tempCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
