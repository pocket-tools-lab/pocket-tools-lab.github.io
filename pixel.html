<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도트 & 아스키 아트 변환기 | Pocket Tools Lab</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pocket-tools-lab.github.io/pixel.html">
    <meta property="og:title" content="👾 도트 & 아스키 아트 변환기">
    <meta property="og:description" content="이미지를 도트 아트로 변환하거나 카톡 복붙용 문자 그림으로 만들어보세요.">
    <meta property="og:image" content="https://pocket-tools-lab.github.io/og-pixel.png">
    
    <link rel="icon" href="https://pocket-tools-lab.github.io/og-pixel.png" type="image/png">

    <style>
        :root { --main-pink: #ff69b4; --light-pink: #fff5fa; --border-pink: #ffceee; }
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; margin: 0; padding: 20px; }
        .nav { max-width: 900px; margin: 0 auto 10px; }
        .nav a { text-decoration: none; color: var(--main-pink); font-weight: bold; font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; border: 1px solid #dbdbdb; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h2 { font-size: 22px; margin-top: 0; margin-bottom: 20px; color: var(--main-pink); text-align: center; }

        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-pink); padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; font-weight: bold; cursor: pointer; color: #999; transition: 0.3s; }
        .tab-btn.active { color: var(--main-pink); border-bottom: 3px solid var(--main-pink); }
        
        .tab-content { display: none; grid-template-columns: 1fr 320px; gap: 20px; }
        .tab-content.active { display: grid; }
        @media (max-width: 850px) { .tab-content.active { grid-template-columns: 1fr; } }

        /* 공통 스타일 */
        canvas, textarea { width: 100%; border: 3px solid var(--border-pink); border-radius: 12px; background: #f9f9f9; image-rendering: pixelated; box-sizing: border-box; }
        textarea { height: 400px; font-family: monospace; font-size: 8px; line-height: 1; white-space: pre; overflow: auto; padding: 10px; outline: none; }
        .controls { background: var(--light-pink); padding: 20px; border-radius: 15px; border: 1px solid var(--border-pink); height: fit-content; }
        .btn-main { background: var(--main-pink); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-main:hover { background: #ff4da6; }
        
        .label-group { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; font-weight: bold; }
        input[type="range"], select { width: 100%; margin-top: 5px; accent-color: var(--main-pink); }
        input[type="file"] { width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="nav"><a href="index.html">← 홈으로 돌아가기</a></div>

    <div class="container">
        <h2>👾 도트 & 아스키 아트 랩</h2>
        
        <div class="tabs">
            <button id="btnImg" class="tab-btn active" onclick="openTab('imageTab')">이미지 도트 (.PNG)</button>
            <button id="btnText" class="tab-btn" onclick="openTab('textTab')">텍스트 도트 (ASCII)</button>
        </div>

        <div class="label-group" style="margin-bottom:10px;"><label>1. 이미지 파일 업로드</label></div>
        <input type="file" id="upload" accept="image/*">

        <div id="imageTab" class="tab-content active">
            <div class="viewer"><canvas id="canvas"></canvas></div>
            <div class="controls">
                <div class="label-group"><label>픽셀 해상도</label><span id="val1" style="color:var(--main-pink)">32px</span></div>
                <input type="range" id="sizeRange" min="8" max="128" value="32">
                
                <div class="label-group"><label>색상 모드</label></div>
                <select id="colorSelect">
                    <option value="0">원본 색상 유지</option>
                    <option value="16">16색 레트로</option>
                    <option value="gray">흑백 명암 (8단계)</option>
                    <option value="bw">단순 2색 (B&W)</option>
                </select>

                <div class="label-group"><label>저장 배율</label></div>
                <select id="downloadScale">
                    <option value="1">1배</option>
                    <option value="10" selected>10배 (선명함)</option>
                </select>

                <button class="btn-main" onclick="downloadImg()">PNG 이미지 저장</button>
            </div>
        </div>

        <div id="textTab" class="tab-content">
            <div class="viewer"><textarea id="asciiResult" readonly placeholder="파일을 업로드하면 텍스트 아트가 생성됩니다..."></textarea></div>
            <div class="controls">
                <div class="label-group"><label>문자 밀도</label><span id="val2" style="color:var(--main-pink)">50</span></div>
                <input type="range" id="asciiRange" min="20" max="100" value="50">
                <p style="font-size:11px; color:#666; line-height:1.5;">* 커뮤니티(디시, 루리웹 등)나 카톡에 복사해서 사용할 수 있는 점자 아트입니다.</p>
                <button class="btn-main" onclick="copyAscii()">📋 텍스트 아트 복사</button>
            </div>
        </div>
    </div>

    <script>
        let originalImg = null;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const asciiResult = document.getElementById('asciiResult');

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'imageTab') document.getElementById('btnImg').classList.add('active');
            else document.getElementById('btnText').classList.add('active');
            if(originalImg) process();
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { originalImg = img; process(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('sizeRange').oninput = function() { document.getElementById('val1').innerText = this.value + "px"; process(); };
        document.getElementById('asciiRange').oninput = function() { document.getElementById('val2').innerText = this.value; process(); };
        document.getElementById('colorSelect').onchange = process;

        function process() {
            if(!originalImg) return;
            
            // 이미지 도트 처리
            const s1 = parseInt(document.getElementById('sizeRange').value);
            const ratio = originalImg.height/originalImg.width;
            canvas.width = s1; canvas.height = Math.round(s1 * ratio);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            
            const mode = document.getElementById('colorSelect').value;
            if(mode !== "0") applyColorLimit(mode);

            // 텍스트 도트 처리
            const s2 = parseInt(document.getElementById('asciiRange').value);
            const tWidth = s2; const tHeight = Math.round(s2 * ratio * 0.5);
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.width = tWidth; tCanvas.height = tHeight;
            tCtx.drawImage(originalImg, 0, 0, tWidth, tHeight);
            const pixels = tCtx.getImageData(0, 0, tWidth, tHeight).data;
            let asciiStr = "";
            for(let y=0; y<tHeight; y++) {
                for(let x=0; x<tWidth; x++) {
                    const i = (y * tWidth + x) * 4;
                    const avg = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                    asciiStr += avg < 128 ? "⣿" : "⠀"; // 어두우면 점자, 밝으면 공백(특수공백)
                }
                asciiStr += "\n";
            }
            asciiResult.value = asciiStr;
        }

        function applyColorLimit(mode) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                if (mode === 'gray') {
                    const avg = (r + g + b) / 3;
                    data[i] = data[i+1] = data[i+2] = Math.round(avg / 32) * 32;
                } else if (mode === 'bw') {
                    const val = (r + g + b) / 3 > 128 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = val;
                } else {
                    const step = Math.floor(256 / Math.pow(parseInt(mode), 1/3));
                    data[i] = Math.round(r/step)*step; data[i+1] = Math.round(g/step)*step; data[i+2] = Math.round(b/step)*step;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function copyAscii() {
            asciiResult.select();
            document.execCommand('copy');
            alert('텍스트 아트가 복사되었습니다! 원하는 곳에 붙여넣으세요.');
        }

        function downloadImg() {
            if(!originalImg) return;
            const scale = parseInt(document.getElementById('downloadScale').value);
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width * scale; tempCanvas.height = canvas.height * scale;
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = tempCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
