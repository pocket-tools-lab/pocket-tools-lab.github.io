<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인스타 줄바꿈 도구 | Pocket Tools Lab</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pocket-tools-lab.github.io/insta.html">
    <meta property="og:title" content="📸 인스타 줄바꿈 변환기">
    <meta property="og:description" content="클릭 한 번으로 깔끔한 피드 문구를 만드세요.">
    <meta property="og:image" content="https://pocket-tools-lab.github.io/og-insta.png">

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav { width: 100%; max-width: 500px; margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #ff69b4; font-size: 14px; font-weight: bold; }
        .container { background: white; padding: 25px; border-radius: 12px; border: 1px solid #dbdbdb; width: 100%; max-width: 500px; box-sizing: border-box; }
        h2 { font-size: 18px; margin-top: 0; text-align: center; }
        textarea { width: 100%; height: 250px; padding: 15px; border: 1px solid #efefef; border-radius: 8px; font-size: 15px; line-height: 1.6; resize: none; box-sizing: border-box; background: #fdfdfd; outline: none; }
        button { background-color: #ff69b4; color: white; border: none; padding: 14px 0; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← 홈으로 돌아가기</a>
    </div>
    <div class="container">
        <h2>📸 인스타 줄바꿈 변환기</h2>
        <textarea id="inputText" placeholder="내용을 입력해주세요. 줄바꿈이 그대로 유지되도록 변환해드립니다."></textarea>
        <button onclick="convert()">변환 및 복사하기</button>
    </div>

    <script>
        function convert() {
            const textArea = document.getElementById('inputText');
            const text = textArea.value;
            if (!text) { alert('변환할 내용을 입력해주세요!'); return; }
            
            // 줄바꿈 문자에 보이지 않는 공백(\u200b) 조합
            const converted = text.replace(/\n/g, '\n\u200b');
            
            const tempElem = document.createElement('textarea');
            tempElem.value = converted;
            document.body.appendChild(tempElem);
            tempElem.select();
            document.execCommand('copy');
            document.body.removeChild(tempElem);
            
            alert('변환 및 복사가 완료되었습니다!\n인스타그램에 바로 붙여넣으세요.');
        }
    </script>
</body>
</html>
